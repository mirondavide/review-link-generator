<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Review Link Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      border: 2px solid #e8ecf0;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: #1a1a2e;
      resize: none;
      height: 90px;
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
    }

    textarea:focus { border-color: #4285f4; }
    textarea::placeholder { color: #b0b8c4; }

    button#btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button#btn:hover { background: #3071e0; }
    button#btn:active { transform: scale(0.98); }
    button#btn:disabled { background: #a8c4f5; cursor: not-allowed; }

    #result { margin-top: 24px; display: none; }

    .result-box {
      background: #f7f9ff;
      border: 2px solid #d0e0ff;
      border-radius: 10px;
      padding: 16px;
    }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      color: #4285f4;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .result-link {
      font-size: 13px;
      color: #1a1a2e;
      word-break: break-all;
      line-height: 1.5;
    }

    .copy-btn {
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: #34a853;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn:hover { background: #2d9249; }
    .copy-btn.copied { background: #188038; }

    #candidates {
      margin-top: 20px;
      display: none;
    }

    .candidates-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
    }

    .candidate-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 2px solid #e8ecf0;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .candidate-item:hover { border-color: #4285f4; background: #f7f9ff; }

    .candidate-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .candidate-address {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    #error {
      margin-top: 14px;
      padding: 12px 16px;
      background: #fff0f0;
      border: 1.5px solid #ffcdd2;
      border-radius: 8px;
      color: #c62828;
      font-size: 13px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#4285f4"/>
    </svg>
    <h1>Review Link Generator</h1>
  </div>

  <label>Link Google Maps</label>
  <textarea id="input" placeholder="Incolla qui il link Google Maps (lungo o corto maps.app.goo.gl)..."></textarea>

  <button id="btn" onclick="generate()">Genera link recensione</button>

  <div id="error"></div>

  <div id="candidates">
    <div class="candidates-label">Trovate più attività con lo stesso nome — seleziona quella giusta:</div>
    <div id="candidates-list"></div>
  </div>

  <div id="result">
    <div class="result-box">
      <div class="result-label">Link recensione Google</div>
      <div class="result-link" id="link-text"></div>
    </div>
    <button class="copy-btn" onclick="copyLink()">Copia link</button>
  </div>
</div>

<script>
  const WORKER_URL = 'https://review-link-worker.mirondevx.workers.dev';
  let reviewLink = '';

  async function generate() {
    const input = document.getElementById('input').value.trim();
    const btn = document.getElementById('btn');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    const candidatesEl = document.getElementById('candidates');

    errorEl.style.display = 'none';
    resultEl.style.display = 'none';
    candidatesEl.style.display = 'none';

    if (!input) { showError('Incolla un link Google Maps.'); return; }

    if (!input.includes('google.com/maps') && !input.includes('maps.app.goo.gl') && !input.includes('goo.gl/maps') && !input.includes('share.google')) {
      showError('Link non valido. Incolla un link Google Maps o maps.app.goo.gl');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ricerca in corso...';

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: input }),
      });

      const data = await res.json();

      if (res.ok && data.review_link) {
        showResult(data.review_link);
      } else {
        showError(data.error || 'Impossibile generare il link. Riprova con un link più preciso.');
      }
    } catch (e) {
      showError('Errore di connessione. Riprova.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Genera link recensione';
    }
  }

  function showResult(link) {
    reviewLink = link;
    document.getElementById('link-text').textContent = reviewLink;
    document.getElementById('result').style.display = 'block';
  }

  function copyLink() {
    if (!reviewLink) return;
    navigator.clipboard.writeText(reviewLink).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copiato!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copia link'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
